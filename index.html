<!DOCTYPE html>
<html>
<head>
    <title>Housing Site Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <!-- Marker Cluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />

    <link rel="stylesheet" href="style.css" />
</head>

<body>

<div id="sidebar">
    <h2>Housing Site Dashboard</h2>

    <label for="talukFilter">Taluk:</label>
    <select id="talukFilter">
        <option value="All">All</option>
    </select>

    <label for="searchBox">Search Village:</label>
    <input type="text" id="searchBox" placeholder="Type village name..." />

    <hr>

    <div id="details">
        Click on a site marker to view details.
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
<script src="script.js"></script>

</body>
</html>
